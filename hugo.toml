baseURL = "https://zebramath.github.io/"
languageCode = "zh-cn"
title = "ZebraMath | 个人主页"
theme = "PaperMod"

paginate = 10

[params]
    env = "production"
    title = "ZebraMath 的空间"
    description = "学术科研 | 游戏影视 | 终身学习者"
    keywords = ["Blog", "Research", "ZebraMath"]
    author = "ZebraMath"
    
    ShowReadingTime = true
    ShowShareButtons = true
    ShowCodeCopyButtons = true
    
    [params.assets]
        disableHLJS = false

    [params.profileMode]
        enabled = true
        title = "你好, 我是 ZebraMath"
        subtitle = "学术科研 | 游戏影视 | 终身学习者"
        imageUrl = "img/avatar.png"
        [[params.profileMode.buttons]]
            name = "阅读博客"
            url = "posts" 
        [[params.profileMode.buttons]]
            name = "关于我"
            url = "about"

[menu]
    [[menu.main]]
        name = "关于"
        pageRef = "about" 
        weight = 10
    [[menu.main]]
        name = "科研"
        pageRef = "research"
        weight = 20
    [[menu.main]]
        name = "简历"
        pageRef = "cv"
        weight = 30
    [[menu.main]]
        name = "爱好"
        pageRef = "hobbies"
        weight = 40
